name: Bug report
description: Something broke or behaved wrong
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer private email? Send the same details to feedback@warmdusk.com.
  - type: input
    id: device
    attributes:
      label: Device model + OS
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Warm Dusk version
      placeholder: v0.1.0-preview
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: adb logcat snippet (optional)
      description: "`adb logcat -d -s WarmDusk` or relevant tags if you have adb access"
    validations:
      required: false
